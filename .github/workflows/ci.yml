name: CI

# Runs on every push and on every pull request targeting main.
on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same branch/PR to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Typecheck, unit tests & build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          # No .nvmrc or package.json "engines" field is defined in this repo,
          # so we pin to a recent Node 20 LTS release for reproducible builds.
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type check (tsc --noEmit)
        run: npx tsc --noEmit

      - name: Unit tests (Vitest)
        run: npm test

      - name: Build (Vite)
        run: npm run build

      # ---------------------------------------------------------------------
      # INTENTIONALLY OUT OF SCOPE: Playwright E2E suite (e2e/*.spec.ts)
      # ---------------------------------------------------------------------
      # The E2E suite requires E2E_TEST_EMAIL / E2E_TEST_PASSWORD env vars
      # pointing at a real, permanently-confirmed test company in the LIVE
      # production Supabase project (see .env.test.local, which is gitignored
      # and intentionally not committed). Running it in CI means every CI run
      # would authenticate against and write to production data.
      #
      # That's a decision involving live production credentials, not
      # something to wire up unprompted. If the repo owner wants E2E coverage
      # in CI, they would need to:
      #   1. Add E2E_TEST_EMAIL and E2E_TEST_PASSWORD as GitHub Actions
      #      repository secrets (Settings -> Secrets and variables -> Actions).
      #   2. Add a step that starts the dev server in the background
      #      (e.g. `npm run dev &`) and waits for it to be ready, then runs
      #      `npx playwright test` with those secrets exposed as env vars.
      #   3. Accept that every CI run (including on untrusted PR branches,
      #      if pull_request triggers are kept) will then touch the live
      #      production database via that test account.
      # Until that trade-off is explicitly accepted, E2E stays a manual,
      # local-only step (`npm run test:e2e`).
